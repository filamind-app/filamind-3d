# Optional: add this section to ~/printer_data/config/moonraker.conf (or an included file) so
# Moonraker's update manager keeps the FilaMind 3d agent updated and shows it in the UI.
# (The agent service itself is installed by `scripts/install.sh agent`, which also registers it in
# moonraker.asvc so it can be restarted from the panel - this snippet adds git-update tracking.)
[update_manager filamind-3d]
type: git_repo
path: ~/filamind-3d
origin: https://github.com/filamind-app/filamind-3d.git
primary_branch: main
managed_services: filamind-3d
# Refresh the backend venv after each update (the UI ships pre-built in the repo):
install_script: deploy/install-agent.sh
