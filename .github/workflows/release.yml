name: Release

# Cut a release by bumping frontend/package.json (and backend if changed) and pushing a tag:
#   git tag v0.1.0 && git push --tags
# Builds the SPA and attaches dist as a release asset (usable by a Moonraker `web` update_manager).
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: cd frontend && npm ci && npm run build
      - run: tar -czf filamind-3d-dist-${{ github.ref_name }}.tar.gz -C frontend/dist .
      # Release notes come from CHANGELOG.md (not auto-generated from commits) so the
      # published text is authored and stays within the R1 no-external-refs rule.
      - name: Release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { cap=1; next }
            cap && /^## \[/ { exit }
            cap { print }
          ' CHANGELOG.md > NOTES.md
          [ -s NOTES.md ] || echo "See CHANGELOG.md for details." > NOTES.md
      - uses: softprops/action-gh-release@v3
        with:
          # Release title is the version tag ALONE; any descriptive summary lives in the release
          # commit / tag annotation, not the Release name. The body comes from CHANGELOG.md.
          name: ${{ github.ref_name }}
          files: filamind-3d-dist-${{ github.ref_name }}.tar.gz
          body_path: NOTES.md
