name: CI
on: [push, pull_request]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # vue-i18n 11 + unplugin require Node >= 22
      # NOTE: @filamind-app/core must be resolvable — via the published package (release) or the
      # suite workspace symlink (local dev). In standalone CI, pin it in package.json first.
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run type-check
      - run: npm test
      - run: npm run i18n:keydiff # every locale must carry exactly the `en` key set
      - run: npm run build
      - name: No external-project references (R1)
        run: bash scripts/check-no-external-refs.sh

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy app
      - run: pytest -q
      - name: No external-project references (R1)
        run: bash scripts/check-no-external-refs.sh
